<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Royalty Admin — Painel</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --g1: #1d2a20; --g2: #2e4031; --g3: #435c47; --g4: #5c7d62;
      --white: #ffffff; --off: #f5f7f5; --muted: #6b7c70;
      --accent: #d1ded4; --gold: #c8a060; --red: #c0392b; --green: #2e7d32;
    }
    body { font-family: 'Montserrat', sans-serif; background: var(--off); color: #111c16; min-height: 100vh; }

    /* LOGIN */
    .login-screen { min-height: 100vh; display: flex; align-items: center; justify-content: center; background: var(--g1); }
    .login-box { background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08); border-radius: 6px; padding: 48px 40px; width: 100%; max-width: 380px; text-align: center; }
    .login-logo { font-size: 2rem; font-weight: 800; color: var(--white); letter-spacing: 0.2em; margin-bottom: 6px; }
    .login-sub { font-size: 0.7rem; font-weight: 600; letter-spacing: 0.2em; color: var(--gold); text-transform: uppercase; margin-bottom: 36px; }
    .login-input { width: 100%; padding: 14px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); border-radius: 3px; color: var(--white); font-family: 'Montserrat', sans-serif; font-size: 0.9rem; font-weight: 500; text-align: center; letter-spacing: 0.15em; outline: none; margin-bottom: 14px; }
    .login-input:focus { border-color: var(--gold); }
    .login-input::placeholder { color: rgba(255,255,255,0.3); letter-spacing: 0.05em; }
    .login-btn { width: 100%; padding: 14px; background: var(--gold); color: var(--g1); border: none; border-radius: 3px; font-family: 'Montserrat', sans-serif; font-size: 0.82rem; font-weight: 800; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; transition: opacity 0.2s; }
    .login-btn:hover { opacity: 0.9; }
    .login-erro { color: #e74c3c; font-size: 0.78rem; font-weight: 600; margin-top: 12px; }

    /* PAINEL */
    .painel { display: none; }
    .topo { background: var(--g1); padding: 16px 28px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .topo-marca { font-size: 1rem; font-weight: 800; color: var(--white); letter-spacing: 0.15em; }
    .topo-sub { font-size: 0.62rem; font-weight: 600; color: var(--gold); letter-spacing: 0.15em; text-transform: uppercase; }
    .topo-acoes { display: flex; gap: 12px; align-items: center; }
    .btn-atualizar { padding: 8px 18px; background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15); color: var(--white); border-radius: 3px; font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; transition: background 0.2s; }
    .btn-atualizar:hover { background: rgba(255,255,255,0.15); }
    .btn-sair { padding: 8px 18px; background: transparent; border: 1px solid rgba(255,255,255,0.2); color: var(--muted); border-radius: 3px; font-family: 'Montserrat', sans-serif; font-size: 0.72rem; font-weight: 700; letter-spacing: 0.08em; cursor: pointer; transition: all 0.2s; }
    .btn-sair:hover { border-color: #e74c3c; color: #e74c3c; }
    .conteudo { padding: 28px; max-width: 1200px; margin: 0 auto; }

    /* RESUMO */
    .resumo-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 28px; }
    .resumo-card { background: var(--white); border-radius: 4px; padding: 22px 24px; border: 1px solid rgba(0,0,0,0.06); }
    .resumo-label { font-size: 0.62rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--muted); margin-bottom: 10px; }
    .resumo-valor { font-size: 1.8rem; font-weight: 800; color: var(--g1); line-height: 1; }
    .resumo-valor.verde { color: var(--green); }
    .resumo-valor.dourado { color: var(--gold); }
    .resumo-valor.vermelho { color: var(--red); }

    /* SECÇÕES */
    .sec-titulo { font-size: 0.72rem; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: var(--g3); margin-bottom: 14px; padding-bottom: 8px; border-bottom: 2px solid var(--accent); }

    /* RANKING */
    .ranking-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 14px; margin-bottom: 28px; }
    .ranking-card { background: var(--white); border-radius: 4px; padding: 18px 20px; border: 1px solid rgba(0,0,0,0.06); position: relative; overflow: hidden; }
    .ranking-card.primeiro::before { content: '🏆'; position: absolute; top: 12px; right: 14px; font-size: 1.2rem; }
    .ranking-nome { font-size: 0.85rem; font-weight: 700; color: var(--g1); text-transform: uppercase; margin-bottom: 14px; }
    .ranking-stat { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid var(--off); font-size: 0.75rem; }
    .ranking-stat:last-child { border-bottom: none; }
    .ranking-stat-lbl { color: var(--muted); font-weight: 600; }
    .ranking-stat-val { font-weight: 800; color: var(--g2); }
    .barra-wrap { margin-top: 12px; }
    .barra-bg { height: 5px; background: var(--accent); border-radius: 10px; overflow: hidden; }
    .barra-fill { height: 100%; background: var(--g2); border-radius: 10px; transition: width 0.6s ease; }

    /* PEDIDOS */
    .pedidos-wrap { background: var(--white); border-radius: 4px; border: 1px solid rgba(0,0,0,0.06); overflow: hidden; margin-bottom: 28px; }
    .pedidos-tabela { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    .pedidos-tabela th { background: var(--g1); color: var(--accent); padding: 12px 16px; text-align: left; font-size: 0.62rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; }
    .pedidos-tabela td { padding: 14px 16px; border-bottom: 1px solid var(--off); color: var(--g1); font-weight: 500; vertical-align: top; }
    .pedidos-tabela tr:last-child td { border-bottom: none; }
    .pedidos-tabela tr:hover td { background: var(--off); }
    .tag-cupao { display: inline-block; background: #e8f5e9; color: var(--green); padding: 2px 8px; border-radius: 2px; font-size: 0.68rem; font-weight: 700; }
    .total-destaque { font-weight: 800; color: var(--g2); font-size: 0.9rem; }
    .itens-lista { font-size: 0.73rem; color: var(--muted); line-height: 1.7; }
    .vazio { text-align: center; padding: 48px 24px; color: var(--muted); font-size: 0.85rem; font-weight: 500; }
    .loading { text-align: center; padding: 48px; color: var(--muted); font-size: 0.8rem; font-weight: 600; letter-spacing: 0.1em; }
    .ultima-atualizacao { font-size: 0.68rem; color: var(--muted); font-weight: 500; text-align: right; margin-bottom: 20px; }

    @media (max-width: 600px) {
      .conteudo { padding: 16px; }
      .topo { padding: 14px 16px; }
      .resumo-valor { font-size: 1.4rem; }
      .pedidos-tabela { font-size: 0.72rem; }
      .pedidos-tabela th, .pedidos-tabela td { padding: 10px 10px; }
    }
  </style>
</head>
<body>

<!-- LOGIN -->
<div class="login-screen" id="login-screen">
  <div class="login-box">
    <div class="login-logo">ROYALTY</div>
    <div class="login-sub">Painel de Administração</div>
    <input type="password" class="login-input" id="login-senha" placeholder="Senha de acesso" onkeydown="if(event.key==='Enter') entrar()"/>
    <button class="login-btn" onclick="entrar()">Entrar</button>
    <div class="login-erro" id="login-erro"></div>
  </div>
</div>

<!-- PAINEL -->
<div class="painel" id="painel">
  <div class="topo">
    <div>
      <div class="topo-marca">ROYALTY</div>
      <div class="topo-sub">Painel de Administração</div>
    </div>
    <div class="topo-acoes">
      <button class="btn-atualizar" onclick="carregarTudo()">↺ Actualizar</button>
      <button class="btn-sair" onclick="sair()">Sair</button>
    </div>
  </div>

  <div class="conteudo">
    <div class="ultima-atualizacao" id="ultima-atualizacao"></div>

    <div class="resumo-grid">
      <div class="resumo-card"><div class="resumo-label">Total de Pedidos</div><div class="resumo-valor dourado" id="stat-pedidos">—</div></div>
      <div class="resumo-card"><div class="resumo-label">Receita Total (MT)</div><div class="resumo-valor verde" id="stat-receita">—</div></div>
      <div class="resumo-card"><div class="resumo-label">Descontos Dados (MT)</div><div class="resumo-valor vermelho" id="stat-descontos">—</div></div>
      <div class="resumo-card"><div class="resumo-label">Cupões Usados</div><div class="resumo-valor" id="stat-cupoes">—</div></div>
      <div class="resumo-card"><div class="resumo-label">Adições ao Carrinho</div><div class="resumo-valor" id="stat-carrinhos">—</div></div>
    </div>

    <div class="sec-titulo">🏆 Ranking de Produtos</div>
    <div class="ranking-grid" id="ranking-produtos"><div class="loading">A carregar estatísticas...</div></div>

    <div class="sec-titulo">📦 Pedidos Recentes</div>
    <div class="pedidos-wrap"><div id="pedidos-conteudo"><div class="loading">A carregar pedidos...</div></div></div>
  </div>
</div>

<script>
  // ════════════════════════════════════════
  // [ADMIN — SENHA DE ACESSO]
  // → Muda 'royalty2024' para a tua senha
  // ════════════════════════════════════════
  const SENHA_ADMIN = 'royalty2024';

  // ════════════════════════════════════════
  // [SUPABASE — CREDENCIAIS]
  // ════════════════════════════════════════
  const SUPABASE_URL = 'https://zrcnwkrvfkykqnhwoklh.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_PX2HcOTmRmbHLDOT5YuKjg_KBNB6aZc';
  const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  function entrar() {
    const senha = document.getElementById('login-senha').value;
    if (senha === SENHA_ADMIN) {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('painel').style.display = 'block';
      carregarTudo();
    } else {
      document.getElementById('login-erro').textContent = 'Senha incorrecta. Tente novamente.';
      document.getElementById('login-senha').value = '';
    }
  }

  function sair() {
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('painel').style.display = 'none';
    document.getElementById('login-senha').value = '';
  }

  async function carregarTudo() {
    await Promise.all([carregarResumo(), carregarRanking(), carregarPedidos()]);
    const agora = new Date();
    document.getElementById('ultima-atualizacao').textContent =
      `Última actualização: ${agora.toLocaleDateString('pt-PT')} às ${agora.toLocaleTimeString('pt-PT')}`;
  }

  async function carregarResumo() {
    try {
      const { data: pedidos } = await db.from('pedidos').select('total, desconto, cupao_usado');
      const { data: carrinhos } = await db.from('eventos').select('id').eq('tipo', 'adicionar_carrinho');
      const totalPedidos = pedidos?.length || 0;
      const receita = pedidos?.reduce((a, p) => a + (p.total || 0), 0) || 0;
      const descontos = pedidos?.reduce((a, p) => a + (p.desconto || 0), 0) || 0;
      const cupoes = pedidos?.filter(p => p.cupao_usado).length || 0;
      document.getElementById('stat-pedidos').textContent = totalPedidos;
      document.getElementById('stat-receita').textContent = receita.toLocaleString('pt-PT') + ' MT';
      document.getElementById('stat-descontos').textContent = descontos.toLocaleString('pt-PT') + ' MT';
      document.getElementById('stat-cupoes').textContent = cupoes;
      document.getElementById('stat-carrinhos').textContent = carrinhos?.length || 0;
    } catch (e) { console.error(e); }
  }

  async function carregarRanking() {
    try {
      const { data } = await db.from('estatisticas_produtos').select('*').order('total_vendas', { ascending: false });
      const container = document.getElementById('ranking-produtos');
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="vazio">Sem dados ainda. As estatísticas aparecem após as primeiras compras.</div>';
        return;
      }
      const maxVendas = Math.max(...data.map(p => p.total_vendas || 0), 1);
      container.innerHTML = data.map((p, idx) => `
        <div class="ranking-card ${idx === 0 && p.total_vendas > 0 ? 'primeiro' : ''}">
          <div class="ranking-nome">${p.produto_nome}</div>
          <div class="ranking-stat"><span class="ranking-stat-lbl">Vendas</span><span class="ranking-stat-val">${p.total_vendas || 0}</span></div>
          <div class="ranking-stat"><span class="ranking-stat-lbl">Unidades Vendidas</span><span class="ranking-stat-val">${p.total_unidades_vendidas || 0}</span></div>
          <div class="ranking-stat"><span class="ranking-stat-lbl">Adicionado ao Carrinho</span><span class="ranking-stat-val">${p.total_carrinho || 0}</span></div>
          <div class="barra-wrap"><div class="barra-bg"><div class="barra-fill" style="width:${Math.round(((p.total_vendas||0)/maxVendas)*100)}%"></div></div></div>
        </div>
      `).join('');
    } catch (e) { console.error(e); }
  }

  async function carregarPedidos() {
    try {
      const { data } = await db.from('pedidos').select('*').order('criado_em', { ascending: false }).limit(50);
      const container = document.getElementById('pedidos-conteudo');
      if (!data || data.length === 0) {
        container.innerHTML = '<div class="vazio">Sem pedidos ainda. Os pedidos aparecem aqui após as primeiras compras finalizadas.</div>';
        return;
      }
      container.innerHTML = `
        <table class="pedidos-tabela">
          <thead><tr><th>Data</th><th>Cliente</th><th>Contacto</th><th>Localização</th><th>Produtos</th><th>Total</th></tr></thead>
          <tbody>
            ${data.map(p => `
              <tr>
                <td>${formatarData(p.criado_em)}</td>
                <td><strong>${p.cliente_nome || '—'}</strong></td>
                <td>${p.cliente_telefone || '—'}</td>
                <td>${p.cliente_localizacao || '—'}</td>
                <td>
                  <div class="itens-lista">${(p.itens||[]).map(i=>`${i.qtd}x ${i.nome} (${i.cor}, ${i.tamanho})`).join('<br>')}</div>
                  ${p.cupao_usado ? `<span class="tag-cupao">🎟 ${p.cupao_usado}</span>` : ''}
                  ${p.notas ? `<div style="font-size:0.7rem;color:var(--muted);margin-top:4px;">📝 ${p.notas}</div>` : ''}
                </td>
                <td>
                  ${p.desconto>0 ? `<div style="font-size:0.72rem;color:var(--muted);text-decoration:line-through;">${p.subtotal} MT</div>` : ''}
                  <div class="total-destaque">${p.total} MT</div>
                  ${p.desconto>0 ? `<div style="font-size:0.7rem;color:var(--green);">-${p.desconto} MT desc.</div>` : ''}
                </td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;
    } catch (e) { console.error(e); }
  }

  function formatarData(iso) {
    if (!iso) return '—';
    const d = new Date(iso);
    return `${d.toLocaleDateString('pt-PT')}<br><span style="font-size:0.68rem;color:var(--muted)">${d.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})}</span>`;
  }

  setInterval(() => {
    if (document.getElementById('painel').style.display !== 'none') carregarTudo();
  }, 120000);
</script>
</body>
</html>
